<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SI-LITABMAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
    <div class="container"><a class="navbar-brand" href="#"><i class="fas fa-university me-2"></i>SI-LITABMAS</a></div>
</nav>

<div class="container">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Data Tim Kegiatan Dosen</h4>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#tambahModal"><i class="fas fa-plus"></i> Tambah Tim</button>
        </div>
        
        <table class="table table-hover">
            <thead class="table-dark">
                <tr><th>Nama Dosen</th><th>Judul Kegiatan</th><th>Peran</th><th>Status</th><th>Aksi</th></tr>
            </thead>
            <tbody>
                {% for item in laporan %}
                <tr>
                    <td>{{ item.nama_dosen }}</td>
                    <td>{{ item.judul_kegiatan }}</td>
                    <td><span class="badge bg-info">{{ item.peran }}</span></td>
                    <td>{{ item.status_kegiatan }}</td>
                    <td>
                        <form action="{{ url_for('delete', id_tim=item.id_tim) }}" method="POST">
                            <button class="btn btn-danger btn-sm" onclick="return confirm('Hapus data ini?')"><i class="fas fa-trash"></i></button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Tambah -->
<div class="modal fade" id="tambahModal" tabindex="-1">
    <div class="modal-dialog">
        <form class="modal-content" action="/tambah" method="POST">
            <div class="modal-header"><h5 class="modal-title">Tambah Tim Kegiatan</h5></div>
            <div class="modal-body">
                <select name="id_dosen" class="form-control mb-2" required>
                    {% for d in dosen_list %}<option value="{{ d.id_dosen }}">{{ d.nama_dosen }}</option>{% endfor %}
                </select>
                <select name="id_kegiatan" class="form-control mb-2" required>
                    {% for k in kegiatan_list %}<option value="{{ k.id_kegiatan }}">{{ k.judul_kegiatan }}</option>{% endfor %}
                </select>
                <select name="peran" class="form-control"><option>Ketua</option><option>Anggota</option></select>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-primary">Simpan</button></div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
